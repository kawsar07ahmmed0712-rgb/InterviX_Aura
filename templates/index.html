<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AI Interview Practice</title>

  <link rel="stylesheet" href="/static/styles.css" />
  <script src="/static/app.js" defer></script>
</head>
<body>
  <main class="page">
    <section class="panel">
      <div class="header">
        <div>
          <p class="eyebrow">AI Interview Practice</p>
          <h1>Mock Interview Agent</h1>
          <p class="subtitle">
            Practice with Gemini 2.5 or local Ollama models.
          </p>
        </div>
      </div>

      <form id="setupForm" class="setup">
        <label>
          Job position
          <input
            id="positionInput"
            type="text"
            value="AI Engineer"
            placeholder="Example: AI Engineer"
          />
        </label>

        <label>
          Provider
          <select id="providerSelect">
            <option value="gemini" selected>Gemini</option>
            <option value="ollama">Ollama</option>
          </select>
        </label>

        <label>
          Model
          <select id="modelSelect"></select>
        </label>

        <button id="startBtn" type="submit">Start Interview</button>
        <button id="stopBtn" type="button" disabled>Stop</button>
      </form>

      <section id="chatBox" class="chat-box">
        <div class="empty-state">
          Select provider/model and start the interview.
        </div>
      </section>

      <form id="answerForm" class="answer-form">
        <input
          id="answerInput"
          type="text"
          placeholder="Wait for your turn..."
          disabled
        />
        <button id="sendBtn" type="submit" disabled>Send</button>
      </form>
    </section>
  </main>
</body>
</html>
